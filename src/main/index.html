<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Listings</title>
    <link rel="stylesheet" href="selectBrand.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }
        .card {
            border: 1px solid #ccc;
            padding: 20px;
            max-width: 400px;
            border-radius: 8px;
        }
        .location{
            border: 0.5px solid #ccc;
            padding: 10px;
            max-width: 400px;
            border-radius: 8px;
        }
        h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

<h1>Car Listing</h1>

<input type="text" id="City" placeholder="Enter City">
<button onclick="searchByCity()">Search by City</button>
<div id="cityLocationContainer"></div>

<script>
    async function searchByCity() {
        const city = document.getElementById("City").value.trim();

        if (!city) {
            alert("Please enter a city name.");
            return;
        }
        
        try {
            const response = await fetch('http://127.0.0.1:8000/cars-by-city', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ city: city })
            });

            if (!response.ok) {
                alert("Failed to fetch data for the specified city.");
                return;
            }
            
            const data = await response.json();
            console.log("City data:", data);
            
            const cityLocationContainer = document.getElementById("cityLocationContainer");
            cityLocationContainer.innerHTML = `
                <div class="location">
                    <h2>📍 ${data.location || city}</h2>
                    <p><strong>City:</strong> ${data.city || city}</p>
                    <p><strong>Region:</strong> ${data.region || 'Unknown'}</p>
                    </div>
                    `;
                    
                } catch (error) {
            console.error("Error:", error);
            alert("An error occurred while searching for the city.");
        }
    }
</script>

<button class="open-button" onclick="openCarModel()">Select Car Model</button>
<div class="form-popup" id="carModelForm">
  <form action="/action_page.php" class="form-container">
    <h1>Car Model Filter</h1>
    
    <label for="brand"><b>Brand</b></label>
    <input type="text" placeholder="Enter Brand" name="brand" required>
    
    <label for="model"><b>Model</b></label>
    <input type="text" placeholder="Enter Model" name="model" required>
    
    <button type="submit" class="btn">Apply Filter</button>
    <button type="button" class="btn cancel" onclick="closeCarModel()">Close</button>
  </form>
</div>

<script>
    function openCarModel() {
        document.getElementById("carModelForm").style.display = "block";
    }
    
    function closeCarModel() {
  document.getElementById("carModelForm").style.display = "none";
}
</script>

</script>
<input type="text" id="carCount"  placeholder="How Many Cars to Display">
<input type="text" id="minPrice"  placeholder="Set Minimum Price">
<input type="text" id="maxPrice"  placeholder="Set Maximum Price">
<input type="text" id="minMilage" placeholder="Set Minimum Mileage">
<input type="text" id="maxMilage" placeholder="Set Maximum Mileage">
 
<button onclick="getCurrentLocation()">Search Cars in Your Area</button>
<div id="locationContainer"></div>
<div id="nearMeCars"></div>
 
<script>
function getCurrentLocation() {
    if (!navigator.geolocation) { alert("Geolocation not supported"); return; }
 
    const btn = document.querySelector("button[onclick='getCurrentLocation()']");
    btn.disabled = true;
    btn.textContent = "📍 Detecting location & scraping...";
 
    navigator.geolocation.getCurrentPosition(async (position) => {
        try {
            const res = await fetch('http://127.0.0.1:8000/cars-near-me', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude:       position.coords.latitude,
                    longitude:      position.coords.longitude,
                    min_price:      parseInt(document.getElementById("minPrice").value)  || null,
                    max_price:      parseInt(document.getElementById("maxPrice").value)  || null,
                    min_milage:     parseInt(document.getElementById("minMilage").value) || null,
                    max_milage:     parseInt(document.getElementById("maxMilage").value) || null,
                    number_of_cars: document.getElementById("carCount").value !== "" 
                        ? parseInt(document.getElementById("carCount").value) 
                        : null,
                })
            });
 
            const data = await res.json();
 
            document.getElementById("locationContainer").innerHTML = `
                <div class="location">
                    <h2>📍 ${data.location}</h2>
                    <p><strong>City:</strong> ${data.city || 'Unknown'}</p>
                    <p><strong>Region:</strong> ${data.region || 'Unknown'}</p>
                </div>`;
 
            const carContainer = document.getElementById("nearMeCars");
            if (!data.cars || data.cars.length === 0) {
                carContainer.innerHTML = "<p>No cars found near you.</p>";
            } else {
                carContainer.innerHTML = `<h3>🚗 ${data.cars.length} Cars Near You</h3>`
                    + data.cars.map(car => `
                        <div class="card">
                            <h2>${car.title || "Unknown"}</h2>
                            ${car.price        ? `<p><strong>Price:</strong>        ${car.price}</p>`        : ""}
                            ${car.mileage      ? `<p><strong>Mileage:</strong>      ${car.mileage}</p>`      : ""}
                            ${car.fuel_type    ? `<p><strong>Fuel Type:</strong>    ${car.fuel_type}</p>`    : ""}
                            ${car.transmission ? `<p><strong>Transmission:</strong> ${car.transmission}</p>` : ""}
                            ${car.href ? `<a href="${car.href}" target="_blank">View on Kijiji →</a>` : ""}
                        </div>`).join("");
            }
 
        } catch (e) {
            console.error(e);
            alert("Error fetching location or cars.");
        } finally {
            btn.disabled = false;
            btn.textContent = "Search Cars in Your Area";
        }
    }, () => {
        alert("Could not get location. Enable location services.");
        btn.disabled = false;
        btn.textContent = "Search Cars in Your Area";
    });
}
</script>


</body>
</html>
